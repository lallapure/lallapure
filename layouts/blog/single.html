{{ define "main" }}
<div class="post-header">
  <a class="post-back" href="/blog/">← 返回文章列表 Back to Blog</a>
  {{ with .Params.category }}<p class="post-cat">{{ . }}</p>{{ end }}
  <h1 class="post-title">{{ .Title }}</h1>
  <p class="post-date">{{ .Date.Format "2006.01.02" }}</p>
</div>
<article class="post-body">
  {{ .Content }}
</article>
{{ end }}
