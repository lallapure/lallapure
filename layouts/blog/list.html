{{ define "main" }}
<section class="section">
  <p class="section-label">文章 · BLOG</p>
  <div class="blog-grid">
    {{ $posts := where site.RegularPages "Section" "blog" }}
    {{ range $posts.ByDate.Reverse }}
    <a class="blog-item" href="{{ .RelPermalink }}">
      <div class="blog-meta">
        <span class="blog-date">{{ .Date.Format "2006.01.02" }}</span>
        {{ with .Params.category }}<span class="blog-cat">{{ . }}</span>{{ end }}
      </div>
      <div class="blog-title">{{ .Title }}</div>
      <div class="blog-excerpt">{{ .Summary | truncate 80 }}</div>
    </a>
    {{ end }}
  </div>
</section>
{{ end }}
